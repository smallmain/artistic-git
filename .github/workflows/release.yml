name: Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish from main when ENABLE_MAIN_RELEASE=true."
        type: boolean
        default: false
      package_audit:
        description: "Build and audit selected release packages without publishing."
        type: boolean
        default: false
      platform_scope:
        description: "Runner platforms for this manual run (test, E2E, and package audit). Push, pull request, and publishing always use every platform."
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      phase12_perf_profile:
        description: "Phase 12 perf profile for this manual run."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - light
          - heavy
      bump:
        description: "Override the calculated SemVer bump for manual releases."
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true

jobs:
  plan:
    name: Version and notes
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      has_changes: ${{ steps.release.outputs.has_changes }}
      notes_path: ${{ steps.release.outputs.notes_path }}
      latest_json_path: ${{ steps.release.outputs.latest_json_path }}
      publish_release: ${{ steps.mode.outputs.publish_release }}
      build_packages: ${{ steps.mode.outputs.build_packages }}
      platform_scope: ${{ steps.mode.outputs.platform_scope }}
      mode_reason: ${{ steps.mode.outputs.mode_reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Calculate release version
        id: release
        shell: bash
        env:
          BUMP_OVERRIDE: ${{ github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release"
          args=(
            --output-dir "$RUNNER_TEMP/release"
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$BUMP_OVERRIDE" != "auto" ]; then
            args+=(--bump "$BUMP_OVERRIDE")
          fi
          node scripts/release-version.mjs \
            "${args[@]}"

      - name: Determine release mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ENABLE_MAIN_RELEASE: ${{ vars.ENABLE_MAIN_RELEASE }}
          DISPATCH_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
          DISPATCH_PACKAGE_AUDIT: ${{ github.event.inputs.package_audit || 'false' }}
          DISPATCH_PLATFORM_SCOPE: ${{ github.event.inputs.platform_scope || 'all' }}
          HAS_CHANGES: ${{ steps.release.outputs.has_changes }}
        run: |
          set -euo pipefail
          publish_release=false
          build_packages=false
          platform_scope=all
          reason="dry-run: ENABLE_MAIN_RELEASE is not true or publish was not requested"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$DISPATCH_PLATFORM_SCOPE" in
              all|windows|linux|macos) platform_scope="$DISPATCH_PLATFORM_SCOPE" ;;
              *) echo "Invalid platform scope: $DISPATCH_PLATFORM_SCOPE" >&2; exit 1 ;;
            esac
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_PACKAGE_AUDIT" = "true" ]; then
            build_packages=true
            reason="package audit: manual package build without publishing"
          elif [ "$HAS_CHANGES" = "true" ] && [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "main" ] && [ "$ENABLE_MAIN_RELEASE" = "true" ]; then
            publish_release=true
            build_packages=true
            platform_scope=all
            reason="release: main push with ENABLE_MAIN_RELEASE=true"
          elif [ "$HAS_CHANGES" = "true" ] && [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$REF_NAME" = "main" ] && [ "$DISPATCH_PUBLISH" = "true" ] && [ "$ENABLE_MAIN_RELEASE" = "true" ]; then
            if [ "$DISPATCH_PLATFORM_SCOPE" != "all" ]; then
              echo "Publishing always builds every platform; set platform_scope=all to publish." >&2
              exit 1
            fi
            publish_release=true
            build_packages=true
            platform_scope=all
            reason="release: manual publish with ENABLE_MAIN_RELEASE=true"
          elif [ "$HAS_CHANGES" != "true" ]; then
            reason="dry-run: no commits after the previous release tag"
          fi

          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "build_packages=$build_packages" >> "$GITHUB_OUTPUT"
          echo "platform_scope=$platform_scope" >> "$GITHUB_OUTPUT"
          echo "mode_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "$reason"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: ${{ runner.temp }}/release/
          retention-days: 14

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event_name != 'workflow_dispatch' || inputs.platform_scope == 'all') &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"},{"os":"macos-latest","gitDistTarget":"macos-universal","rustTargets":"aarch64-apple-darwin,x86_64-apple-darwin"},{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'windows' &&
            '[{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'linux' &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"}]' ||
            '[{"os":"macos-latest","gitDistTarget":"macos-universal","rustTargets":"aarch64-apple-darwin,x86_64-apple-darwin"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            dbus-x11 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.rustTargets }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: artistic-git-${{ matrix.gitDistTarget }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Test embedded toolchain state
        run: pnpm git-toolchain:state:test

      - name: Compute embedded toolchain cache key
        id: toolchain-cache-key
        run: node scripts/emit-git-toolchain-cache-key.mjs --target=${{ matrix.gitDistTarget }}

      - name: Restore embedded toolchain base cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/artistic-git/git-toolchain/downloads
            .cache/artistic-git/git-toolchain/bases
          key: ${{ steps.toolchain-cache-key.outputs.base-key }}

      - name: Restore embedded toolchain helper cache
        uses: actions/cache@v4
        with:
          path: .cache/artistic-git/git-toolchain/helpers
          key: ${{ steps.toolchain-cache-key.outputs.helper-key }}

      - name: Ensure embedded toolchain
        run: pnpm git-toolchain:ensure -- --target=${{ matrix.gitDistTarget }}

      - name: Verify embedded toolchain
        run: pnpm git-toolchain:verify -- --target=${{ matrix.gitDistTarget }}

      - name: Check generated bindings
        run: pnpm bindings:check

      - name: Lint frontend
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Audit push safety
        run: pnpm git:push-safety:check

      - name: Audit i18n coverage
        run: pnpm i18n:audit

      - name: Audit accessibility baseline
        run: pnpm accessibility:audit

      - name: Audit privacy network surface
        run: pnpm privacy:audit:test && pnpm privacy:audit

      - name: Check release scripts and bundle resources
        if: runner.os == 'Linux'
        run: pnpm release:check

      - name: Audit phase 9 crash isolation
        env:
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_AUDIT_REPORT: ${{ runner.temp }}/phase9-crash-isolation/phase9-crash-isolation-audit.json
        run: pnpm phase9:crash-isolation:audit

      - name: Upload phase 9 crash isolation audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-crash-isolation-${{ runner.os }}
          path: ${{ runner.temp }}/phase9-crash-isolation/
          retention-days: 14

      - name: Test frontend
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Compile Rust tests
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --workspace --no-run --locked

      - name: Test Rust
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --workspace

      - name: Generate phase 12 failure matrix
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_FAILURE_MATRIX_REPORT_DIR: ${{ runner.temp }}/phase12-failure-matrix
        run: pnpm phase12:failure-matrix

      - name: Upload phase 12 failure matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-failure-matrix-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-failure-matrix/
          retention-days: 14

  # Phase 12 perf uses only the embedded git-dist (no app compile). Keep it as a
  # sibling gate so heavy benchmarks do not serialize behind clippy/cargo test.
  perf:
    name: Perf (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event_name != 'workflow_dispatch' || inputs.platform_scope == 'all') &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"},{"os":"macos-latest","gitDistTarget":"macos-universal","rustTargets":"aarch64-apple-darwin,x86_64-apple-darwin"},{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'windows' &&
            '[{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'linux' &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"}]' ||
            '[{"os":"macos-latest","gitDistTarget":"macos-universal","rustTargets":"aarch64-apple-darwin,x86_64-apple-darwin"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # Helper rebuild on a cold toolchain cache still needs the pinned Rust toolchain.
      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: artistic-git-${{ matrix.gitDistTarget }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute embedded toolchain cache key
        id: toolchain-cache-key
        run: node scripts/emit-git-toolchain-cache-key.mjs --target=${{ matrix.gitDistTarget }}

      - name: Restore embedded toolchain base cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/artistic-git/git-toolchain/downloads
            .cache/artistic-git/git-toolchain/bases
          key: ${{ steps.toolchain-cache-key.outputs.base-key }}

      - name: Restore embedded toolchain helper cache
        uses: actions/cache@v4
        with:
          path: .cache/artistic-git/git-toolchain/helpers
          key: ${{ steps.toolchain-cache-key.outputs.helper-key }}

      - name: Ensure embedded toolchain
        run: pnpm git-toolchain:ensure -- --target=${{ matrix.gitDistTarget }}

      - name: Verify embedded toolchain
        run: pnpm git-toolchain:verify -- --target=${{ matrix.gitDistTarget }}

      - name: Verify phase 12 perf envelope
        timeout-minutes: 30
        shell: bash
        env:
          PHASE12_PERF_PROFILE: >-
            ${{ inputs.phase12_perf_profile == 'heavy' && 'heavy' ||
                inputs.phase12_perf_profile == 'light' && 'light' ||
                (github.event_name != 'workflow_dispatch' || inputs.platform_scope == 'all') && 'heavy' ||
                'light' }}
          ARTISTIC_GIT_PHASE12_PERF_REPORT: ${{ runner.temp }}/phase12-perf/phase12-perf-report.json
        run: |
          set -euo pipefail
          case "$PHASE12_PERF_PROFILE" in
            heavy) pnpm -s phase12:perf -- --heavy ;;
            light) pnpm -s phase12:perf -- --light ;;
            *) echo "::error::invalid resolved phase 12 perf profile: $PHASE12_PERF_PROFILE"; exit 1 ;;
          esac

      - name: Upload phase 12 perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-perf-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-perf/
          retention-days: 14

  e2e:
    name: E2E (${{ matrix.os }})
    if: github.event_name != 'workflow_dispatch' || inputs.platform_scope != 'macos'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event_name != 'workflow_dispatch' || inputs.platform_scope == 'all') &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"},{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'windows' &&
            '[{"os":"windows-latest","gitDistTarget":"windows-x86_64","rustTargets":"x86_64-pc-windows-msvc"}]' ||
            inputs.platform_scope == 'linux' &&
            '[{"os":"ubuntu-22.04","gitDistTarget":"linux-x86_64","rustTargets":"x86_64-unknown-linux-gnu"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri and WebDriver dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            dbus-x11 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            pipewire \
            pipewire-bin \
            pipewire-media-session \
            webkit2gtk-driver \
            xvfb

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: artistic-git-${{ matrix.gitDistTarget }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute embedded toolchain cache key
        id: toolchain-cache-key
        run: node scripts/emit-git-toolchain-cache-key.mjs --target=${{ matrix.gitDistTarget }}

      - name: Restore embedded toolchain base cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/artistic-git/git-toolchain/downloads
            .cache/artistic-git/git-toolchain/bases
          key: ${{ steps.toolchain-cache-key.outputs.base-key }}

      - name: Restore embedded toolchain helper cache
        uses: actions/cache@v4
        with:
          path: .cache/artistic-git/git-toolchain/helpers
          key: ${{ steps.toolchain-cache-key.outputs.helper-key }}

      - name: Ensure embedded toolchain
        run: pnpm git-toolchain:ensure -- --target=${{ matrix.gitDistTarget }}

      - name: Verify embedded toolchain
        run: pnpm git-toolchain:verify -- --target=${{ matrix.gitDistTarget }}

      - name: Report real Git E2E availability
        id: real-git-e2e
        run: pnpm e2e:real-git:report

      - name: Cache tauri-driver
        id: tauri-driver-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/tauri-driver
            ~/.cargo/bin/tauri-driver.exe
          key: tauri-driver-${{ runner.os }}-2.0.6

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --version 2.0.6 --locked

      - name: Diagnose Tauri WebDriver tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "DISPLAY=${DISPLAY:-}"
          echo "GDK_BACKEND=${GDK_BACKEND:-}"
          echo "GTK_USE_PORTAL=${GTK_USE_PORTAL:-}"
          echo "XDG_SESSION_TYPE=${XDG_SESSION_TYPE:-}"
          command -v tauri-driver
          tauri-driver --version || true
          command -v WebKitWebDriver
          WebKitWebDriver --version || true
          command -v pipewire || true
          pipewire --version || true

      - name: Run Tauri E2E on Linux
        id: tauri_e2e_linux
        if: runner.os == 'Linux'
        timeout-minutes: 35
        shell: bash
        env:
          ARTISTIC_GIT_E2E_CONNECTION_RETRY_TIMEOUT_MS: "240000"
          ARTISTIC_GIT_E2E_GIT_TIMEOUT_MS: "120000"
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/main
          ARTISTIC_GIT_E2E_START_TIMEOUT_MS: "90000"
          GDK_BACKEND: x11
          GALLIUM_DRIVER: llvmpipe
          GSK_RENDERER: cairo
          GTK_USE_PORTAL: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          RUST_BACKTRACE: "1"
          RUST_LOG: info,artistic_git=debug
          TAURI_DRIVER_PORT: "4444"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          XDG_CACHE_HOME: ${{ runner.temp }}/tauri-e2e-cache/main
          XDG_CONFIG_HOME: ${{ runner.temp }}/tauri-e2e-config/main
          XDG_CURRENT_DESKTOP: GNOME
          XDG_DATA_HOME: ${{ runner.temp }}/tauri-e2e-data/main
          XDG_SESSION_TYPE: x11
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
          mkdir -p "$XDG_RUNTIME_DIR" "$ARTISTIC_GIT_E2E_LOG_DIR" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          chmod 700 "$XDG_RUNTIME_DIR"
          export ARTISTIC_GIT_E2E_SPEC_SET=real
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" dbus-run-session -- bash -lc '
            set -euo pipefail
            pipewire_pid=""
            media_session_pid=""
            if command -v pipewire >/dev/null 2>&1; then
              pipewire >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-main.log" 2>&1 &
              pipewire_pid=$!
            fi
            if command -v pipewire-media-session >/dev/null 2>&1; then
              pipewire-media-session >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-media-session-main.log" 2>&1 &
              media_session_pid=$!
            fi
            trap "kill ${media_session_pid:-} ${pipewire_pid:-} 2>/dev/null || true" EXIT
            if [ -n "${pipewire_pid}" ]; then
              for _ in $(seq 1 20); do
                [ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && break
                sleep 0.25
              done
              echo "PipeWire socket present: $([ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && echo yes || echo no)"
            fi
            pnpm e2e:tauri:ci
          '

      - name: Stop lingering Linux WebDriver processes
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          pkill -TERM -x tauri-driver
          pkill -TERM -x WebKitWebDriver
          pkill -TERM -f '/artistic-git-shell($| )'
          sleep 2
          pkill -KILL -x tauri-driver
          pkill -KILL -x WebKitWebDriver
          pkill -KILL -f '/artistic-git-shell($| )'
          exit 0

      - name: Run Tauri E2E on Windows
        id: tauri_e2e_windows
        if: runner.os == 'Windows'
        env:
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/main
          ARTISTIC_GIT_E2E_PROFILE_DIR: ${{ runner.temp }}/tauri-e2e-profile/main
          ARTISTIC_GIT_E2E_SPEC_SET: real
        run: pnpm e2e:tauri:ci

      - name: Run phase 9 crash isolation E2E evidence on Linux
        id: phase9_crash_e2e_linux
        if: always() && runner.os == 'Linux'
        shell: bash
        env:
          ARTISTIC_GIT_E2E_SPEC_SET: crash
          ARTISTIC_GIT_E2E_CONNECTION_RETRY_TIMEOUT_MS: "240000"
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/crash
          ARTISTIC_GIT_E2E_START_TIMEOUT_MS: "90000"
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_E2E_REPORT: ${{ runner.temp }}/phase9-crash-isolation-e2e/phase9-crash-isolation-e2e-${{ runner.os }}.json
          GDK_BACKEND: x11
          GALLIUM_DRIVER: llvmpipe
          GSK_RENDERER: cairo
          GTK_USE_PORTAL: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          RUST_BACKTRACE: "1"
          RUST_LOG: info,artistic_git=debug
          TAURI_DRIVER_PORT: "4454"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          XDG_CACHE_HOME: ${{ runner.temp }}/tauri-e2e-cache/crash
          XDG_CONFIG_HOME: ${{ runner.temp }}/tauri-e2e-config/crash
          XDG_CURRENT_DESKTOP: GNOME
          XDG_DATA_HOME: ${{ runner.temp }}/tauri-e2e-data/crash
          XDG_SESSION_TYPE: x11
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
          mkdir -p "$XDG_RUNTIME_DIR" "$ARTISTIC_GIT_E2E_LOG_DIR" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          chmod 700 "$XDG_RUNTIME_DIR"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" dbus-run-session -- bash -lc '
            set -euo pipefail
            pipewire_pid=""
            media_session_pid=""
            if command -v pipewire >/dev/null 2>&1; then
              pipewire >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-crash.log" 2>&1 &
              pipewire_pid=$!
            fi
            if command -v pipewire-media-session >/dev/null 2>&1; then
              pipewire-media-session >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-media-session-crash.log" 2>&1 &
              media_session_pid=$!
            fi
            trap "kill ${media_session_pid:-} ${pipewire_pid:-} 2>/dev/null || true" EXIT
            if [ -n "${pipewire_pid}" ]; then
              for _ in $(seq 1 20); do
                [ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && break
                sleep 0.25
              done
              echo "PipeWire socket present: $([ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && echo yes || echo no)"
            fi
            pnpm e2e:tauri:ci
          '

      - name: Run phase 9 crash isolation E2E evidence on Windows
        id: phase9_crash_e2e_windows
        if: always() && runner.os == 'Windows'
        env:
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/crash
          ARTISTIC_GIT_E2E_PROFILE_DIR: ${{ runner.temp }}/tauri-e2e-profile/crash
          ARTISTIC_GIT_E2E_SPEC_SET: crash
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_E2E_REPORT: ${{ runner.temp }}/phase9-crash-isolation-e2e/phase9-crash-isolation-e2e-${{ runner.os }}.json
        run: pnpm e2e:tauri:ci

      - name: Finalize phase 12 E2E runtime evidence
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_E2E_LINUX_OUTCOME: ${{ steps.tauri_e2e_linux.outcome || 'skipped' }}
          ARTISTIC_GIT_PHASE12_E2E_WINDOWS_OUTCOME: ${{ steps.tauri_e2e_windows.outcome || 'skipped' }}
        run: pnpm -s phase12:e2e:finalize

      - name: Upload phase 9 crash isolation E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-crash-isolation-e2e-${{ runner.os }}
          path: ${{ runner.temp }}/phase9-crash-isolation-e2e/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload real Git E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-git-report-${{ matrix.os }}
          path: |
            artifacts/e2e-real-git-report-*
            artifacts/e2e-real-git-clone-diagnostic-*
            artifacts/phase12-e2e-full-chain-evidence-*
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Tauri E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/tauri-e2e-logs/
            ${{ runner.temp }}/tauri-e2e-cache/
            ${{ runner.temp }}/tauri-e2e-config/
            ${{ runner.temp }}/tauri-e2e-data/
            ${{ runner.temp }}/tauri-e2e-profile/
          if-no-files-found: ignore
          retention-days: 14

  phase12-evidence-summary:
    name: Phase 12 evidence summary
    needs:
      - test
      - perf
      - e2e
      - dry-run
      - package
    if: >-
      ${{ always() &&
        (github.event_name != 'workflow_dispatch' || inputs.platform_scope == 'all')
      }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download phase 12 perf reports
        uses: actions/download-artifact@v4
        with:
          pattern: phase12-perf-*
          path: ${{ runner.temp }}/phase12-evidence-input
          if-no-files-found: warn

      - name: Download phase 12 E2E reports
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-real-git-report-*
          path: ${{ runner.temp }}/phase12-evidence-input
          if-no-files-found: warn

      - name: Generate phase 12 evidence summary
        run: |
          node scripts/phase12-evidence-summary.mjs \
            --artifacts-dir="${{ runner.temp }}/phase12-evidence-input" \
            --report-dir="${{ runner.temp }}/phase12-evidence-summary" \
            --current-head-sha="${GITHUB_SHA}"

      - name: Download release rehearsal evidence
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: release-rehearsal-*
          path: ${{ runner.temp }}/phase12-evidence-input
          if-no-files-found: warn

      - name: Detect release rehearsal evidence
        id: release-rehearsal-evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          input_dir="${{ runner.temp }}/phase12-evidence-input"
          found=false
          if [ -d "$input_dir" ] && find "$input_dir" -type f \( -name '*release-rehearsal*' -o -path '*/release-rehearsal-*/*' \) | grep -q .; then
            found=true
          fi
          echo "present=${found}" >> "$GITHUB_OUTPUT"
          if [ "$found" = "true" ]; then
            echo "Readiness summary will include same-run release rehearsal evidence."
          else
            echo "No same-run release-rehearsal-* artifacts were available for readiness evidence."
          fi

      - name: Generate readiness summary
        if: always() && steps.release-rehearsal-evidence.outputs.present == 'true'
        env:
          # Dry-run/package checklists are same-run operator evidence; keep them
          # visible in readiness without failing every PR/main evidence job.
          ARTISTIC_GIT_READINESS_SOFT_OPERATOR_BLOCKERS: "1"
        run: |
          node scripts/readiness-summary.mjs \
            --artifacts-dir="${{ runner.temp }}/phase12-evidence-input" \
            --artifacts-dir="${{ runner.temp }}/phase12-evidence-summary" \
            --report-dir="${{ runner.temp }}/readiness-summary" \
            --expected-head-sha="${GITHUB_SHA}"

      - name: Upload phase 12 evidence summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-evidence-summary
          path: ${{ runner.temp }}/phase12-evidence-summary/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload readiness summary
        if: always() && steps.release-rehearsal-evidence.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: readiness-summary
          path: ${{ runner.temp }}/readiness-summary/
          if-no-files-found: warn
          retention-days: 14

  dry-run:
    name: Dry-run package (${{ matrix.os }})
    needs: plan
    if: needs.plan.outputs.build_packages != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            gitDistTarget: linux-x86_64
            rustTargets: x86_64-unknown-linux-gnu
          - os: macos-14
            gitDistTarget: macos-universal
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-2022
            gitDistTarget: windows-x86_64
            rustTargets: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free Linux release packaging disk space
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet
          df -h /

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            squashfs-tools \
            zsync \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: artistic-git-${{ matrix.gitDistTarget }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute embedded toolchain cache key
        id: toolchain-cache-key
        run: node scripts/emit-git-toolchain-cache-key.mjs --target=${{ matrix.gitDistTarget }}

      - name: Restore embedded toolchain base cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/artistic-git/git-toolchain/downloads
            .cache/artistic-git/git-toolchain/bases
          key: ${{ steps.toolchain-cache-key.outputs.base-key }}

      - name: Restore embedded toolchain helper cache
        uses: actions/cache@v4
        with:
          path: .cache/artistic-git/git-toolchain/helpers
          key: ${{ steps.toolchain-cache-key.outputs.helper-key }}

      - name: Ensure embedded toolchain
        run: pnpm git-toolchain:ensure -- --target=${{ matrix.gitDistTarget }}

      - name: Verify embedded toolchain
        run: pnpm git-toolchain:verify -- --target=${{ matrix.gitDistTarget }}

      - name: Check release scripts and bundle resources
        run: pnpm release:check

      - name: Generate release rehearsal dry-run checklist
        env:
          ARTISTIC_GIT_RELEASE_REHEARSAL_REPORT_DIR: ${{ runner.temp }}/release-rehearsal
          ARTISTIC_GIT_RELEASE_REHEARSAL_ARTIFACT_NAME: release-rehearsal-${{ runner.os }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_RUN_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
          ARTISTIC_GIT_RELEASE_WORKFLOW_ATTEMPT: ${{ github.run_attempt }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_SHA: ${{ github.sha }}
          ARTISTIC_GIT_RELEASE_PLAN_VERSION: ${{ needs.plan.outputs.version }}
          ARTISTIC_GIT_RELEASE_PLAN_TAG: ${{ needs.plan.outputs.tag }}
          ARTISTIC_GIT_RELEASE_MODE_REASON: ${{ needs.plan.outputs.mode_reason }}
        run: pnpm release:rehearsal:checklist

      - name: Upload release rehearsal dry-run checklist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-rehearsal-${{ runner.os }}
          path: ${{ runner.temp }}/release-rehearsal/
          retention-days: 14

      - name: Dry-run Tauri package build
        run: pnpm tauri build --ci --no-bundle

  package:
    name: Package release/audit (${{ matrix.os }})
    needs: plan
    if: needs.plan.outputs.build_packages == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJSON(
            (needs.plan.outputs.publish_release == 'true' || needs.plan.outputs.platform_scope == 'all') &&
            '[{"os":"macos-14","bundles":"app,dmg","target":"universal-apple-darwin","gitDistTarget":"macos-universal","artifactName":"artistic-git-macos"},{"os":"windows-2022","bundles":"nsis","target":"x86_64-pc-windows-msvc","gitDistTarget":"windows-x86_64","artifactName":"artistic-git-windows"},{"os":"ubuntu-22.04","bundles":"appimage,deb","target":"x86_64-unknown-linux-gnu","gitDistTarget":"linux-x86_64","artifactName":"artistic-git-linux"}]' ||
            needs.plan.outputs.platform_scope == 'windows' &&
            '[{"os":"windows-2022","bundles":"nsis","target":"x86_64-pc-windows-msvc","gitDistTarget":"windows-x86_64","artifactName":"artistic-git-windows"}]' ||
            needs.plan.outputs.platform_scope == 'linux' &&
            '[{"os":"ubuntu-22.04","bundles":"appimage,deb","target":"x86_64-unknown-linux-gnu","gitDistTarget":"linux-x86_64","artifactName":"artistic-git-linux"}]' ||
            '[{"os":"macos-14","bundles":"app,dmg","target":"universal-apple-darwin","gitDistTarget":"macos-universal","artifactName":"artistic-git-macos"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free Linux release packaging disk space
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet
          df -h /

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            squashfs-tools \
            zsync \
            pkg-config \
            libssl-dev
          command -v desktop-file-validate
          command -v file
          command -v mksquashfs
          command -v zsync

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.os == 'macos-14' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: artistic-git-${{ matrix.gitDistTarget }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: "true"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute embedded toolchain cache key
        id: toolchain-cache-key
        run: node scripts/emit-git-toolchain-cache-key.mjs --target=${{ matrix.gitDistTarget }}

      - name: Restore embedded toolchain base cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/artistic-git/git-toolchain/downloads
            .cache/artistic-git/git-toolchain/bases
          key: ${{ steps.toolchain-cache-key.outputs.base-key }}

      - name: Restore embedded toolchain helper cache
        uses: actions/cache@v4
        with:
          path: .cache/artistic-git/git-toolchain/helpers
          key: ${{ steps.toolchain-cache-key.outputs.helper-key }}

      - name: Ensure embedded toolchain
        run: pnpm git-toolchain:ensure -- --target=${{ matrix.gitDistTarget }}

      - name: Verify embedded toolchain
        run: pnpm git-toolchain:verify -- --target=${{ matrix.gitDistTarget }}

      - name: Check release scripts and bundle resources
        run: pnpm release:check

      - name: Generate release rehearsal package checklist
        env:
          ARTISTIC_GIT_RELEASE_REHEARSAL_REPORT_DIR: ${{ runner.temp }}/release-rehearsal
          ARTISTIC_GIT_RELEASE_REHEARSAL_ARTIFACT_NAME: release-rehearsal-${{ runner.os }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_RUN_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
          ARTISTIC_GIT_RELEASE_WORKFLOW_ATTEMPT: ${{ github.run_attempt }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_SHA: ${{ github.sha }}
          ARTISTIC_GIT_RELEASE_PLAN_VERSION: ${{ needs.plan.outputs.version }}
          ARTISTIC_GIT_RELEASE_PLAN_TAG: ${{ needs.plan.outputs.tag }}
          ARTISTIC_GIT_RELEASE_MODE_REASON: ${{ needs.plan.outputs.mode_reason }}
        run: pnpm release:rehearsal:checklist

      - name: Upload release rehearsal package checklist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-rehearsal-${{ runner.os }}
          path: ${{ runner.temp }}/release-rehearsal/
          retention-days: 14

      - name: Apply release version to package manifests
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          cp Cargo.lock "$RUNNER_TEMP/artistic-git-canonical-Cargo.lock"
          node scripts/apply-release-version.mjs --version "$RELEASE_VERSION"
          cargo metadata --format-version 1 --no-deps >/dev/null

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: node scripts/apply-tauri-updater-public-key.mjs

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_UPDATER_PUBLIC_KEY:-}" ]; then
            echo "TAURI_UPDATER_PUBLIC_KEY must be configured in GitHub Variables or Secrets before publishing updater artifacts." >&2
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY must be configured in GitHub Secrets before publishing updater artifacts." >&2
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD must be configured in GitHub Secrets before publishing updater artifacts." >&2
            exit 1
          fi

      - name: Validate staged embedded Git resources
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check-tauri-bundle-resources.mjs --require-manifest --release
          pnpm git-toolchain:verify -- --target="${{ matrix.gitDistTarget }}"

      - name: Prepare Linux Git dependency probe
        if: runner.os == 'Linux'
        shell: bash
        env:
          PROBE_DIR: ${{ runner.temp }}/artistic-git-linuxdeploy-probe
        run: |
          set -euo pipefail
          rm -rf "$PROBE_DIR"
          mkdir -p "$PROBE_DIR"
          probe_count=0
          while IFS= read -r -d '' executable; do
            description="$(file -b "$executable")"
            if [[ "$description" == *ELF* && "$description" == *"dynamically linked"* ]]; then
              probe_count=$((probe_count + 1))
              destination="$(printf '%s/probe-%04d' "$PROBE_DIR" "$probe_count")"
              cp --preserve=mode "$executable" "$destination"
            fi
          done < <(find src-tauri/resources/git-dist -type f -perm /111 -print0)
          test "$probe_count" -gt 0

      - name: Build Tauri bundles
        if: runner.os != 'Linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"

      - name: Build Tauri bundles (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          ADDITIONAL_BIN_DIRS: ${{ runner.temp }}/artistic-git-linuxdeploy-probe
          APPIMAGE_EXTRACT_AND_RUN: "1"
          RUST_LOG: tauri_bundler=debug
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          df -h /
          du -sh src-tauri/resources/git-dist || true
          pnpm tauri build --ci --verbose --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}" || {
            status=$?
            df -h /
            find target -maxdepth 6 \
              \( -iname '*linuxdeploy*' -o -iname '*.AppImage' -o -iname '*.AppDir' \) \
              -print || true
            exit "$status"
          }

      - name: Restore canonical embedded helper fingerprint inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f "$RUNNER_TEMP/artistic-git-canonical-Cargo.lock"
          cp "$RUNNER_TEMP/artistic-git-canonical-Cargo.lock" Cargo.lock

      - name: Optimize and re-sign macOS release bundles
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          dmgs=()
          updaters=()
          while IFS= read -r -d '' dmg; do dmgs+=("$dmg"); done < <(
            find "target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -type f -name '*.dmg' -print0
          )
          while IFS= read -r -d '' updater; do updaters+=("$updater"); done < <(
            find "target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type f -name '*.app.tar.gz' -print0
          )
          if [ "${#dmgs[@]}" -ne 1 ] || [ "${#updaters[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS DMG and updater, found ${#dmgs[@]} DMG and ${#updaters[@]} updater." >&2
            exit 1
          fi
          audit_dir="artifacts/release-size-audit-${{ matrix.gitDistTarget }}"
          mkdir -p "$audit_dir"
          node scripts/optimize-macos-release-bundles.mjs \
            "--dmg=${dmgs[0]}" \
            "--updater=${updaters[0]}" \
            "--report=$audit_dir/macos-bundle-optimization-report.json"

      - name: Repack and re-sign Linux DEB with xz
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          debs=()
          while IFS= read -r -d '' deb; do debs+=("$deb"); done < <(
            find "target/${{ matrix.target }}/release/bundle/deb" -maxdepth 1 -type f -name '*.deb' -print0
          )
          if [ "${#debs[@]}" -ne 1 ]; then
            echo "Expected exactly one Linux DEB to repack, found ${#debs[@]}." >&2
            exit 1
          fi
          audit_dir="artifacts/release-size-audit-${{ matrix.gitDistTarget }}"
          mkdir -p "$audit_dir"
          node scripts/repack-deb.mjs \
            "--deb=${debs[0]}" \
            "--report=$audit_dir/deb-repack-report.json"

      - name: Install Windows bundle for resource verification
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -Path "target/${{ matrix.target }}/release/bundle/nsis" -Filter "*.exe")
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installers.Count)."
          }
          $installer = $installers[0]

          $installDir = Join-Path $env:RUNNER_TEMP "artistic-git-bundle-check"
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath $installer.FullName -ArgumentList @("/S", "/D=$installDir") -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer exited with code $($process.ExitCode)."
          }
          if (-not (Test-Path (Join-Path $installDir "git-dist/manifest.json"))) {
            throw "Installed NSIS bundle is missing git-dist/manifest.json."
          }

      - name: Resolve packaged resource output
        id: packaged-resource-output
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "path=${RUNNER_TEMP}/artistic-git-bundle-check" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            apps=()
            while IFS= read -r -d '' app; do apps+=("$app"); done < <(
              find "target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name '*.app' -print0
            )
            if [ "${#apps[@]}" -ne 1 ]; then
              echo "Expected exactly one packaged macOS app, found ${#apps[@]}." >&2
              exit 1
            fi
            echo "path=${apps[0]}" >> "$GITHUB_OUTPUT"
          else
            app_dirs=()
            while IFS= read -r -d '' app_dir; do app_dirs+=("$app_dir"); done < <(
              find "target/${{ matrix.target }}/release/bundle/appimage" -maxdepth 1 -type d -name '*.AppDir' -print0
            )
            if [ "${#app_dirs[@]}" -ne 1 ]; then
              echo "Expected exactly one packaged Linux AppDir, found ${#app_dirs[@]}." >&2
              exit 1
            fi
            echo "path=${app_dirs[0]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify packaged Linux Git runtime
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          app_dir="${{ steps.packaged-resource-output.outputs.path }}"
          git_dist="$app_dir/usr/share/artistic-git/git-dist"
          app_lib="$app_dir/usr/lib"
          runtime_home="$RUNNER_TEMP/artistic-git-linux-home"
          ldd_report="$RUNNER_TEMP/artistic-git-packaged-ldd.txt"
          test -f "$git_dist/manifest.json"
          test ! -e "$app_dir/usr/lib/Artistic Git/git-dist"
          test -e "$app_lib/librtmp.so.1"
          test -e "$app_lib/libgnutls.so.30"
          test -e "$app_lib/libsasl2.so.2"
          mkdir -p "$runtime_home"

          git_path="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).paths.gitExecutable' "$git_dist/manifest.json")"
          git_lfs_path="$(node -p 'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8")).paths.gitLfsExecutable' "$git_dist/manifest.json")"
          env -i \
            HOME="$runtime_home" \
            PATH="/usr/bin:/bin" \
            LD_LIBRARY_PATH="$app_lib" \
            "$git_dist/$git_path" --version
          env -i \
            HOME="$runtime_home" \
            PATH="/usr/bin:/bin" \
            LD_LIBRARY_PATH="$app_lib" \
            "$git_dist/$git_lfs_path" version

          : > "$ldd_report"
          packaged_elf_count=0
          while IFS= read -r -d '' executable; do
            description="$(file -b "$executable")"
            if [[ "$description" == *ELF* && "$description" == *"dynamically linked"* ]]; then
              packaged_elf_count=$((packaged_elf_count + 1))
              echo "### $executable" >> "$ldd_report"
              LD_LIBRARY_PATH="$app_lib" ldd "$executable" >> "$ldd_report"
            fi
          done < <(find "$git_dist" -type f -perm /111 -print0)
          test "$packaged_elf_count" -gt 0
          if grep -q 'not found' "$ldd_report"; then
            cat "$ldd_report" >&2
            exit 1
          fi

      - name: Verify and smoke packaged embedded Git resources
        shell: bash
        run: |
          set -euo pipefail
          runtime_args=(--runtime-smoke)
          if [ "$RUNNER_OS" = "Linux" ]; then
            runtime_args+=("--runtime-library-path=${{ steps.packaged-resource-output.outputs.path }}/usr/lib")
          fi
          node scripts/check-tauri-bundle-resources.mjs \
            --require-manifest \
            --release \
            --bundle-output "${{ steps.packaged-resource-output.outputs.path }}" \
            --require-bundled-resource \
            "${runtime_args[@]}"

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          bundle_dirs=(
            "target/release/bundle"
            "target/${{ matrix.target }}/release/bundle"
          )
          for bundle_dir in "${bundle_dirs[@]}"; do
            if [ ! -d "$bundle_dir" ]; then
              continue
            fi
            find "$bundle_dir" -type f \
              \( -name '*.dmg' \
              -o -name '*.app.tar.gz' \
              -o -name '*.app.tar.gz.sig' \
              -o -name '*.AppImage' \
              -o -name '*.AppImage.tar.gz' \
              -o -name '*.AppImage.tar.gz.sig' \
              -o -name '*.deb' \
              -o -name '*.exe' \
              -o -name '*.exe.zip' \
              -o -name '*.exe.zip.sig' \
              -o -name '*.sig' \) \
              -exec cp {} release-assets/ \;
          done
          test -n "$(find release-assets -type f -print -quit)"

      - name: Generate release size audit
        shell: bash
        env:
          AUDIT_DIR: artifacts/release-size-audit-${{ matrix.gitDistTarget }}
          TOOLCHAIN_TARGET: ${{ matrix.gitDistTarget }}
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          installed_tree="${{ steps.packaged-resource-output.outputs.path }}"
          test -n "$installed_tree"
          test -d "$installed_tree"
          mkdir -p "$AUDIT_DIR"
          cp src-tauri/resources/git-dist/manifest.json "$AUDIT_DIR/manifest.json"
          audit_args=(
            "--target=$TOOLCHAIN_TARGET"
            "--baseline=size-baselines.json"
            "--tree=installed=$installed_tree"
            "--bundle-dir=release-assets"
            "--compression-basis=installed"
            "--output=$AUDIT_DIR/size-report.json"
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            debs=()
            while IFS= read -r -d '' deb; do debs+=("$deb"); done < <(
              find release-assets -maxdepth 1 -type f -name '*.deb' -print0
            )
            if [ "${#debs[@]}" -ne 1 ]; then
              echo "Expected exactly one staged Linux DEB, found ${#debs[@]}." >&2
              exit 1
            fi
            deb_tree="$RUNNER_TEMP/artistic-git-deb-tree"
            rm -rf "$deb_tree"
            mkdir -p "$deb_tree"
            dpkg-deb --extract "${debs[0]}" "$deb_tree"
            audit_args+=(
              "--tree=deb-installed=$deb_tree"
              "--bundle-compression-basis=deb=deb-installed"
            )
          fi
          node scripts/size-audit.mjs "${audit_args[@]}"
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          import path from "node:path";

          const outputDir = path.resolve(process.env.AUDIT_DIR);
          const report = JSON.parse(
            await readFile(path.join(outputDir, "size-report.json"), "utf8"),
          );
          const evidence = {
            schemaVersion: 1,
            target: process.env.TOOLCHAIN_TARGET,
            releaseVersion: process.env.RELEASE_VERSION,
            toolchainRevision: report.gitDist.toolchainRevision,
            distributionFingerprint: report.gitDist.distributionFingerprint,
            commitSha: process.env.GITHUB_SHA,
            workflowRunUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            packagedResourceValidation:
              "node scripts/check-tauri-bundle-resources.mjs --require-bundled-resource --runtime-smoke",
          };
          await writeFile(
            path.join(outputDir, "build-evidence.json"),
            `${JSON.stringify(evidence, null, 2)}\n`,
          );
          NODE

      - name: Upload release size audit
        uses: actions/upload-artifact@v4
        with:
          name: release-size-audit-${{ matrix.gitDistTarget }}
          path: artifacts/release-size-audit-${{ matrix.gitDistTarget }}/
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets/
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [plan, test, e2e, perf, package]
    if: needs.plan.outputs.publish_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: release-plan

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: artistic-git-*
          merge-multiple: true

      - name: Generate updater latest.json
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.plan.outputs.tag }}
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          PUB_DATE="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('release-plan/release-plan.json', 'utf8')).generatedAt)")"
          node scripts/generate-tauri-latest-json.mjs \
            --assets-dir release-assets \
            --version "$RELEASE_VERSION" \
            --tag "$TAG_NAME" \
            --repo "$GH_REPO" \
            --notes-file release-plan/RELEASE_NOTES.md \
            --pub-date "$PUB_DATE" \
            --output release-assets/latest.json

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-assets/* \
            --title "Artistic Git $TAG_NAME" \
            --target "$GITHUB_SHA" \
            --notes-file release-plan/RELEASE_NOTES.md

      - name: Commit released version to the default branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
          TAG_NAME: ${{ needs.plan.outputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "release-version-$RELEASE_VERSION" "origin/$DEFAULT_BRANCH"
          node scripts/apply-release-version.mjs --version "$RELEASE_VERSION"
          cargo metadata --format-version 1 --no-deps >/dev/null
          if git diff --quiet -- package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml crates/app/Cargo.toml Cargo.lock; then
            echo "Release version $RELEASE_VERSION is already committed on $DEFAULT_BRANCH."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml crates/app/Cargo.toml Cargo.lock
          git commit -m "chore(release): set version to $RELEASE_VERSION [skip ci]"
          git push origin "HEAD:$DEFAULT_BRANCH"
