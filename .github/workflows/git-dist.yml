name: Git Toolchain Audit

on:
  pull_request:
    paths:
      - ".gitattributes"
      - "package.json"
      - "pnpm-lock.yaml"
      - "size-baselines.json"
      - "git-dist.toml"
      - "git-toolchain.lock.json"
      - "scripts/build-git-toolchain-helpers.mjs"
      - "scripts/git-toolchain-*.mjs"
      - "scripts/fetch-git-dist.mjs"
      - "scripts/fetch-git-dist.node-tests.mjs"
      - "scripts/git-dist-lib.mjs"
      - "scripts/check-git-dist.mjs"
      - "scripts/check-tauri-bundle-resources.mjs"
      - "scripts/size-audit.mjs"
      - "scripts/size-audit.node-tests.mjs"
      - "crates/helpers/**"
      - "crates/contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docs/git-dist.md"
      - ".github/workflows/git-dist.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.96.1"

jobs:
  contract:
    name: Validate toolchain contract
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pinned configuration and lock
        run: pnpm git-toolchain:config:check

      - name: Validate bundle resource mapping
        run: node scripts/check-tauri-bundle-resources.mjs

      - name: Test size audit
        run: node --test scripts/size-audit.node-tests.mjs

  audit:
    name: Clean build audit (${{ matrix.target }})
    needs: contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x86_64
            os: windows-2022
            rustTargets: x86_64-pc-windows-msvc
          - target: macos-universal
            os: macos-14
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - target: linux-x86_64
            os: ubuntu-22.04
            rustTargets: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded toolchain from a cold cache
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .cache/artistic-git/git-toolchain src-tauri/resources/git-dist
          pnpm git-toolchain:ensure -- --target="${{ matrix.target }}"
          pnpm git-toolchain:verify -- --target="${{ matrix.target }}"

      - name: Write manifest, build evidence, and size report
        shell: bash
        env:
          AUDIT_DIR: artifacts/git-toolchain-audit-${{ matrix.target }}
          TOOLCHAIN_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_DIR"
          cp src-tauri/resources/git-dist/manifest.json "$AUDIT_DIR/manifest.json"
          audit_args=(
            "--target=$TOOLCHAIN_TARGET"
            "--baseline=size-baselines.json"
            "--output=$AUDIT_DIR/size-report.json"
          )
          case "$TOOLCHAIN_TARGET" in
            macos-universal)
              audit_args+=("--legacy-duplicate-baseline=1700000000")
              ;;
            linux-x86_64)
              audit_args+=("--legacy-duplicate-baseline=3900000000")
              ;;
          esac
          node scripts/size-audit.mjs "${audit_args[@]}"
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          import path from "node:path";

          const outputDir = path.resolve(process.env.AUDIT_DIR);
          const manifest = JSON.parse(
            await readFile(path.join(outputDir, "manifest.json"), "utf8"),
          );
          const evidence = {
            schemaVersion: 1,
            target: process.env.TOOLCHAIN_TARGET,
            toolchainRevision: manifest.toolchainRevision,
            distributionFingerprint: manifest.distributionFingerprint,
            commitSha: process.env.GITHUB_SHA,
            workflowRunUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            validation: "pnpm git-toolchain:verify",
            sizeAudit: "node scripts/size-audit.mjs",
          };
          await writeFile(path.join(outputDir, "build-evidence.json"), `${JSON.stringify(evidence, null, 2)}\n`);
          NODE

      - name: Upload audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: git-toolchain-audit-${{ matrix.target }}
          path: artifacts/git-toolchain-audit-${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 14
