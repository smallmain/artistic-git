name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated bindings
        run: pnpm bindings:check

      - name: Lint frontend
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Audit push safety
        run: pnpm git:push-safety:check

      - name: Audit i18n coverage
        run: pnpm i18n:audit

      - name: Audit accessibility baseline
        run: pnpm accessibility:audit

      - name: Audit privacy network surface
        run: pnpm privacy:audit

      - name: Test frontend
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace

      - name: Generate phase 12 failure matrix
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_FAILURE_MATRIX_REPORT_DIR: ${{ runner.temp }}/phase12-failure-matrix
        run: pnpm phase12:failure-matrix

      - name: Upload phase 12 failure matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-failure-matrix-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-failure-matrix/
          retention-days: 14

      - name: Verify phase 12 perf envelope
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_PERF_REPORT: ${{ runner.temp }}/phase12-perf/phase12-perf-report.json
        run: pnpm phase12:perf

      - name: Upload phase 12 perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-perf-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-perf/
          retention-days: 14

  e2e:
    name: E2E (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    env:
      ARTISTIC_GIT_DIST_DIR: ${{ vars.ARTISTIC_GIT_E2E_DIST_DIR }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri and WebDriver dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            webkit2gtk-driver \
            xvfb

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Report real Git E2E availability
        id: real-git-e2e
        run: pnpm e2e:real-git:report

      - name: Install tauri-driver
        run: cargo install tauri-driver --version 2.0.6 --locked

      - name: Run Tauri E2E on Linux
        if: runner.os == 'Linux'
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: ${{ steps.real-git-e2e.outputs.ready == 'true' && '1' || '0' }}
        run: xvfb-run --auto-servernum pnpm e2e:tauri:ci

      - name: Run Tauri E2E on Windows
        if: runner.os == 'Windows'
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: ${{ steps.real-git-e2e.outputs.ready == 'true' && '1' || '0' }}
        run: pnpm e2e:tauri:ci

      - name: Upload real Git E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-git-report-${{ matrix.os }}
          path: artifacts/e2e-real-git-report-*.json
          if-no-files-found: warn
