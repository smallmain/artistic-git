name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      phase12_perf_profile:
        description: "Phase 12 perf profile for this manual CI run."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - light
          - heavy
      phase12_perf_require_real_git_dist:
        description: "Fail the perf gate instead of writing skipped evidence when ARTISTIC_GIT_DIST_DIR is missing."
        required: false
        default: false
        type: boolean
      phase12_git_dist_run_id:
        description: "Completed Git Distribution build run id whose artistic-git-dist-* artifacts should be used for Phase 12 evidence."
        required: false
        default: ""
        type: string
      phase12_e2e_require_real_git_dist:
        description: "Fail the real-git E2E availability report when a real git-dist artifact cannot be staged."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            gitDistTarget: linux-x86_64
          - os: macos-latest
            gitDistTarget: macos-universal
          - os: windows-latest
            gitDistTarget: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve phase 12 git-dist evidence source
        id: phase12-git-dist
        shell: bash
        env:
          DISPATCH_GIT_DIST_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.phase12_git_dist_run_id || '' }}
          DEFAULT_GIT_DIST_RUN_ID: ${{ vars.ARTISTIC_GIT_PHASE12_GIT_DIST_RUN_ID }}
          FALLBACK_DIST_DIR: ${{ vars.ARTISTIC_GIT_PHASE12_PERF_DIST_DIR }}
          DIST_DIR: ${{ runner.temp }}/phase12-git-dist/${{ matrix.gitDistTarget }}
          ARTIFACT_NAME: artistic-git-dist-${{ matrix.gitDistTarget }}
          GIT_DIST_TARGET: ${{ matrix.gitDistTarget }}
        run: |
          set -euo pipefail
          run_id="${DISPATCH_GIT_DIST_RUN_ID:-${DEFAULT_GIT_DIST_RUN_ID:-}}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "dist_dir=${DIST_DIR}" >> "$GITHUB_OUTPUT"
          echo "target=${GIT_DIST_TARGET}" >> "$GITHUB_OUTPUT"
          if [ -n "$run_id" ]; then
            echo "Phase 12 will try ${ARTIFACT_NAME} from Git Distribution run ${run_id}."
          elif [ -n "${FALLBACK_DIST_DIR:-}" ]; then
            echo "Phase 12 will use ARTISTIC_GIT_PHASE12_PERF_DIST_DIR fallback."
          else
            echo "No Phase 12 git-dist artifact run id or fallback dist dir configured."
          fi

      - name: Download phase 12 git-dist artifact
        if: steps.phase12-git-dist.outputs.run_id != ''
        id: phase12-git-dist-download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ steps.phase12-git-dist.outputs.artifact_name }}
          path: ${{ steps.phase12-git-dist.outputs.dist_dir }}
          run-id: ${{ steps.phase12-git-dist.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Activate phase 12 git-dist evidence source
        if: always()
        shell: bash
        env:
          RUN_ID: ${{ steps.phase12-git-dist.outputs.run_id }}
          ARTIFACT_NAME: ${{ steps.phase12-git-dist.outputs.artifact_name }}
          DIST_DIR: ${{ steps.phase12-git-dist.outputs.dist_dir }}
          GIT_DIST_TARGET: ${{ steps.phase12-git-dist.outputs.target }}
          FALLBACK_DIST_DIR: ${{ vars.ARTISTIC_GIT_PHASE12_PERF_DIST_DIR }}
          RUN_URL: ${{ steps.phase12-git-dist.outputs.run_id != '' && format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, steps.phase12-git-dist.outputs.run_id) || '' }}
        run: |
          set -euo pipefail
          node scripts/activate-phase12-git-dist.mjs

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            dbus-x11 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated bindings
        run: pnpm bindings:check

      - name: Lint frontend
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Audit push safety
        run: pnpm git:push-safety:check

      - name: Audit i18n coverage
        run: pnpm i18n:audit

      - name: Audit accessibility baseline
        run: pnpm accessibility:audit

      - name: Audit privacy network surface
        run: pnpm privacy:audit

      - name: Audit phase 9 crash isolation
        env:
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_AUDIT_REPORT: ${{ runner.temp }}/phase9-crash-isolation/phase9-crash-isolation-audit.json
        run: pnpm phase9:crash-isolation:audit

      - name: Upload phase 9 crash isolation audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-crash-isolation-${{ runner.os }}
          path: ${{ runner.temp }}/phase9-crash-isolation/
          retention-days: 14

      - name: Test frontend
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace

      - name: Generate phase 12 failure matrix
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_FAILURE_MATRIX_REPORT_DIR: ${{ runner.temp }}/phase12-failure-matrix
        run: pnpm phase12:failure-matrix

      - name: Upload phase 12 failure matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-failure-matrix-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-failure-matrix/
          retention-days: 14

      - name: Verify phase 12 perf envelope
        if: always()
        shell: bash
        env:
          PHASE12_PERF_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.phase12_perf_profile || 'auto' }}
          PHASE12_PERF_REQUIRE_REAL_GIT_DIST: ${{ github.event_name == 'workflow_dispatch' && inputs.phase12_perf_require_real_git_dist && 'true' || 'false' }}
          ARTISTIC_GIT_PHASE12_PERF_REPORT: ${{ runner.temp }}/phase12-perf/phase12-perf-report.json
        run: |
          set -euo pipefail
          profile_arg=""
          require_arg=""
          if [ "$PHASE12_PERF_PROFILE" = "heavy" ]; then
            profile_arg="--heavy"
          elif [ "$PHASE12_PERF_PROFILE" = "light" ]; then
            profile_arg="--light"
          fi
          if [ "$PHASE12_PERF_REQUIRE_REAL_GIT_DIST" = "true" ]; then
            require_arg="--require-real-git-dist"
          fi
          if [ -n "$profile_arg" ] && [ -n "$require_arg" ]; then
            pnpm -s phase12:perf -- "$profile_arg" "$require_arg"
          elif [ -n "$profile_arg" ]; then
            pnpm -s phase12:perf -- "$profile_arg"
          elif [ -n "$require_arg" ]; then
            pnpm -s phase12:perf -- "$require_arg"
          else
            pnpm -s phase12:perf
          fi

      - name: Upload phase 12 perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-perf-${{ runner.os }}
          path: ${{ runner.temp }}/phase12-perf/
          retention-days: 14

  e2e:
    name: E2E (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            gitDistTarget: linux-x86_64
          - os: windows-latest
            gitDistTarget: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve phase 12 git-dist evidence source
        id: phase12-git-dist
        shell: bash
        env:
          DISPATCH_GIT_DIST_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.phase12_git_dist_run_id || '' }}
          DEFAULT_GIT_DIST_RUN_ID: ${{ vars.ARTISTIC_GIT_PHASE12_GIT_DIST_RUN_ID }}
          FALLBACK_DIST_DIR: ${{ vars.ARTISTIC_GIT_E2E_DIST_DIR }}
          DIST_DIR: ${{ runner.temp }}/phase12-git-dist/${{ matrix.gitDistTarget }}
          ARTIFACT_NAME: artistic-git-dist-${{ matrix.gitDistTarget }}
          GIT_DIST_TARGET: ${{ matrix.gitDistTarget }}
        run: |
          set -euo pipefail
          run_id="${DISPATCH_GIT_DIST_RUN_ID:-${DEFAULT_GIT_DIST_RUN_ID:-}}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "dist_dir=${DIST_DIR}" >> "$GITHUB_OUTPUT"
          echo "target=${GIT_DIST_TARGET}" >> "$GITHUB_OUTPUT"
          if [ -n "$run_id" ]; then
            echo "Phase 12 E2E will try ${ARTIFACT_NAME} from Git Distribution run ${run_id}."
          elif [ -n "${FALLBACK_DIST_DIR:-}" ]; then
            echo "Phase 12 E2E will use ARTISTIC_GIT_E2E_DIST_DIR fallback."
          else
            echo "No Phase 12 E2E git-dist artifact run id or fallback dist dir configured."
          fi

      - name: Download phase 12 git-dist artifact
        if: steps.phase12-git-dist.outputs.run_id != ''
        id: phase12-git-dist-download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ steps.phase12-git-dist.outputs.artifact_name }}
          path: ${{ steps.phase12-git-dist.outputs.dist_dir }}
          run-id: ${{ steps.phase12-git-dist.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Activate phase 12 git-dist evidence source
        if: always()
        shell: bash
        env:
          RUN_ID: ${{ steps.phase12-git-dist.outputs.run_id }}
          ARTIFACT_NAME: ${{ steps.phase12-git-dist.outputs.artifact_name }}
          DIST_DIR: ${{ steps.phase12-git-dist.outputs.dist_dir }}
          GIT_DIST_TARGET: ${{ steps.phase12-git-dist.outputs.target }}
          FALLBACK_DIST_DIR: ${{ vars.ARTISTIC_GIT_E2E_DIST_DIR }}
          RUN_URL: ${{ steps.phase12-git-dist.outputs.run_id != '' && format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, steps.phase12-git-dist.outputs.run_id) || '' }}
        run: |
          set -euo pipefail
          node scripts/activate-phase12-git-dist.mjs

      - name: Install Linux Tauri and WebDriver dependencies
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure*' \) -print -delete
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y \
            dbus-x11 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            pipewire \
            pipewire-bin \
            pipewire-media-session \
            webkit2gtk-driver \
            xvfb

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Report real Git E2E availability
        id: real-git-e2e
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: ${{ github.event_name == 'workflow_dispatch' && inputs.phase12_e2e_require_real_git_dist && '1' || '0' }}
        run: pnpm e2e:real-git:report

      - name: Install tauri-driver
        run: cargo install tauri-driver --version 2.0.6 --locked

      - name: Diagnose Tauri WebDriver tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "DISPLAY=${DISPLAY:-}"
          echo "GDK_BACKEND=${GDK_BACKEND:-}"
          echo "GTK_USE_PORTAL=${GTK_USE_PORTAL:-}"
          echo "XDG_SESSION_TYPE=${XDG_SESSION_TYPE:-}"
          command -v tauri-driver
          tauri-driver --version || true
          command -v WebKitWebDriver
          WebKitWebDriver --version || true
          command -v pipewire || true
          pipewire --version || true

      - name: Run Tauri E2E on Linux
        id: tauri_e2e_linux
        if: runner.os == 'Linux' && steps.real-git-e2e.outputs.ready == 'true'
        shell: bash
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: "1"
          ARTISTIC_GIT_E2E_CONNECTION_RETRY_TIMEOUT_MS: "240000"
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/main
          ARTISTIC_GIT_E2E_START_TIMEOUT_MS: "90000"
          GDK_BACKEND: x11
          GALLIUM_DRIVER: llvmpipe
          GSK_RENDERER: cairo
          GTK_USE_PORTAL: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          RUST_BACKTRACE: "1"
          RUST_LOG: info,artistic_git=debug
          TAURI_DRIVER_PORT: "4444"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          XDG_CACHE_HOME: ${{ runner.temp }}/tauri-e2e-cache/main
          XDG_CONFIG_HOME: ${{ runner.temp }}/tauri-e2e-config/main
          XDG_CURRENT_DESKTOP: GNOME
          XDG_DATA_HOME: ${{ runner.temp }}/tauri-e2e-data/main
          XDG_SESSION_TYPE: x11
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
          mkdir -p "$XDG_RUNTIME_DIR" "$ARTISTIC_GIT_E2E_LOG_DIR" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          chmod 700 "$XDG_RUNTIME_DIR"
          export ARTISTIC_GIT_E2E_SPEC_SET=real
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" dbus-run-session -- bash -lc '
            set -euo pipefail
            pipewire_pid=""
            media_session_pid=""
            if command -v pipewire >/dev/null 2>&1; then
              pipewire >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-main.log" 2>&1 &
              pipewire_pid=$!
            fi
            if command -v pipewire-media-session >/dev/null 2>&1; then
              pipewire-media-session >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-media-session-main.log" 2>&1 &
              media_session_pid=$!
            fi
            trap "kill ${media_session_pid:-} ${pipewire_pid:-} 2>/dev/null || true" EXIT
            if [ -n "${pipewire_pid}" ]; then
              for _ in $(seq 1 20); do
                [ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && break
                sleep 0.25
              done
              echo "PipeWire socket present: $([ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && echo yes || echo no)"
            fi
            pnpm e2e:tauri:ci
          '

      - name: Stop lingering Linux WebDriver processes
        if: always() && runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          pkill -TERM -x tauri-driver
          pkill -TERM -x WebKitWebDriver
          pkill -TERM -f '/artistic-git-shell($| )'
          sleep 2
          pkill -KILL -x tauri-driver
          pkill -KILL -x WebKitWebDriver
          pkill -KILL -f '/artistic-git-shell($| )'
          exit 0

      - name: Run Tauri E2E on Windows
        id: tauri_e2e_windows
        if: runner.os == 'Windows' && steps.real-git-e2e.outputs.ready == 'true'
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: "1"
        run: |
          $env:ARTISTIC_GIT_E2E_SPEC_SET = "real"
          pnpm e2e:tauri:ci

      - name: Run phase 9 crash isolation E2E evidence on Linux
        id: phase9_crash_e2e_linux
        if: always() && runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: "0"
          ARTISTIC_GIT_E2E_SKIP_BUILD: ${{ steps.tauri_e2e_linux.outcome == 'skipped' && '0' || '1' }}
          ARTISTIC_GIT_E2E_SPEC_SET: crash
          ARTISTIC_GIT_E2E_CONNECTION_RETRY_TIMEOUT_MS: "240000"
          ARTISTIC_GIT_E2E_LOG_DIR: ${{ runner.temp }}/tauri-e2e-logs/crash
          ARTISTIC_GIT_E2E_START_TIMEOUT_MS: "90000"
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_E2E_REPORT: ${{ runner.temp }}/phase9-crash-isolation-e2e/phase9-crash-isolation-e2e-${{ runner.os }}.json
          GDK_BACKEND: x11
          GALLIUM_DRIVER: llvmpipe
          GSK_RENDERER: cairo
          GTK_USE_PORTAL: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          RUST_BACKTRACE: "1"
          RUST_LOG: info,artistic_git=debug
          TAURI_DRIVER_PORT: "4454"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          XDG_CACHE_HOME: ${{ runner.temp }}/tauri-e2e-cache/crash
          XDG_CONFIG_HOME: ${{ runner.temp }}/tauri-e2e-config/crash
          XDG_CURRENT_DESKTOP: GNOME
          XDG_DATA_HOME: ${{ runner.temp }}/tauri-e2e-data/crash
          XDG_SESSION_TYPE: x11
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
          mkdir -p "$XDG_RUNTIME_DIR" "$ARTISTIC_GIT_E2E_LOG_DIR" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          chmod 700 "$XDG_RUNTIME_DIR"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" dbus-run-session -- bash -lc '
            set -euo pipefail
            pipewire_pid=""
            media_session_pid=""
            if command -v pipewire >/dev/null 2>&1; then
              pipewire >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-crash.log" 2>&1 &
              pipewire_pid=$!
            fi
            if command -v pipewire-media-session >/dev/null 2>&1; then
              pipewire-media-session >"${ARTISTIC_GIT_E2E_LOG_DIR}/pipewire-media-session-crash.log" 2>&1 &
              media_session_pid=$!
            fi
            trap "kill ${media_session_pid:-} ${pipewire_pid:-} 2>/dev/null || true" EXIT
            if [ -n "${pipewire_pid}" ]; then
              for _ in $(seq 1 20); do
                [ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && break
                sleep 0.25
              done
              echo "PipeWire socket present: $([ -S "${XDG_RUNTIME_DIR}/pipewire-0" ] && echo yes || echo no)"
            fi
            pnpm e2e:tauri:ci
          '

      - name: Run phase 9 crash isolation E2E evidence on Windows
        id: phase9_crash_e2e_windows
        if: always() && runner.os == 'Windows'
        continue-on-error: true
        env:
          ARTISTIC_GIT_E2E_REAL_GIT: "0"
          ARTISTIC_GIT_E2E_SKIP_BUILD: ${{ steps.tauri_e2e_windows.outcome == 'skipped' && '0' || '1' }}
          ARTISTIC_GIT_E2E_SPEC_SET: crash
          ARTISTIC_GIT_PHASE9_CRASH_ISOLATION_E2E_REPORT: ${{ runner.temp }}/phase9-crash-isolation-e2e/phase9-crash-isolation-e2e-${{ runner.os }}.json
        run: pnpm e2e:tauri:ci

      - name: Finalize phase 12 E2E runtime evidence
        if: always()
        env:
          ARTISTIC_GIT_PHASE12_E2E_LINUX_OUTCOME: ${{ steps.tauri_e2e_linux.outcome || 'skipped' }}
          ARTISTIC_GIT_PHASE12_E2E_WINDOWS_OUTCOME: ${{ steps.tauri_e2e_windows.outcome || 'skipped' }}
        run: pnpm -s phase12:e2e:finalize

      - name: Upload phase 9 crash isolation E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase9-crash-isolation-e2e-${{ runner.os }}
          path: ${{ runner.temp }}/phase9-crash-isolation-e2e/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload real Git E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-git-report-${{ matrix.os }}
          path: |
            artifacts/e2e-real-git-report-*
            artifacts/phase12-e2e-full-chain-evidence-*
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Tauri E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-e2e-logs-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/tauri-e2e-logs/
            ${{ runner.temp }}/tauri-e2e-cache/
            ${{ runner.temp }}/tauri-e2e-config/
            ${{ runner.temp }}/tauri-e2e-data/
          if-no-files-found: ignore
          retention-days: 14

  phase12-evidence-summary:
    name: Phase 12 evidence summary
    needs:
      - test
      - e2e
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download phase 12 perf reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: phase12-perf-*
          path: ${{ runner.temp }}/phase12-evidence-input

      - name: Download phase 12 E2E reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-real-git-report-*
          path: ${{ runner.temp }}/phase12-evidence-input

      - name: Generate phase 12 evidence summary
        run: |
          node scripts/phase12-evidence-summary.mjs \
            --artifacts-dir="${{ runner.temp }}/phase12-evidence-input" \
            --report-dir="${{ runner.temp }}/phase12-evidence-summary"

      - name: Upload phase 12 evidence summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-evidence-summary
          path: ${{ runner.temp }}/phase12-evidence-summary/
          if-no-files-found: warn
          retention-days: 14
