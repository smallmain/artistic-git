name: Git Toolchain Audit

on:
  pull_request:
    paths:
      - "git-dist.toml"
      - "git-toolchain.lock.json"
      - "scripts/git-toolchain-*.mjs"
      - "scripts/fetch-git-dist.mjs"
      - "scripts/git-dist-lib.mjs"
      - "scripts/check-git-dist.mjs"
      - "scripts/check-tauri-bundle-resources.mjs"
      - "crates/helpers/**"
      - "crates/contracts/**"
      - "Cargo.lock"
      - "docs/git-dist.md"
      - ".github/workflows/git-dist.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.96.1"

jobs:
  contract:
    name: Validate toolchain contract
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pinned configuration and lock
        run: pnpm git-toolchain:config:check

      - name: Validate bundle resource mapping
        run: node scripts/check-tauri-bundle-resources.mjs

  audit:
    name: Clean build audit (${{ matrix.target }})
    needs: contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x86_64
            os: windows-2022
            rustTargets: x86_64-pc-windows-msvc
          - target: macos-universal
            os: macos-14
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
          - target: linux-x86_64
            os: ubuntu-22.04
            rustTargets: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up fixed Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded toolchain from a cold cache
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .cache/artistic-git/git-toolchain src-tauri/resources/git-dist
          pnpm git-toolchain:ensure -- --target="${{ matrix.target }}"
          pnpm git-toolchain:verify -- --target="${{ matrix.target }}"

      - name: Write manifest, build evidence, and size report
        shell: bash
        env:
          AUDIT_DIR: artifacts/git-toolchain-audit-${{ matrix.target }}
          TOOLCHAIN_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_DIR"
          cp src-tauri/resources/git-dist/manifest.json "$AUDIT_DIR/manifest.json"
          node --input-type=module <<'NODE'
          import { lstat, mkdir, readFile, readdir, writeFile } from "node:fs/promises";
          import path from "node:path";

          const root = path.resolve("src-tauri/resources/git-dist");
          const outputDir = path.resolve(process.env.AUDIT_DIR);
          const componentBytes = {};
          let totalBytes = 0;
          let fileCount = 0;

          async function measure(directory) {
            let bytes = 0;
            for (const entry of await readdir(directory, { withFileTypes: true })) {
              const entryPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                bytes += await measure(entryPath);
              } else if (entry.isFile()) {
                const stat = await lstat(entryPath);
                bytes += stat.size;
                totalBytes += stat.size;
                fileCount += 1;
              }
            }
            return bytes;
          }

          for (const entry of await readdir(root, { withFileTypes: true })) {
            if (entry.isDirectory()) {
              componentBytes[entry.name] = await measure(path.join(root, entry.name));
            } else if (entry.isFile()) {
              const stat = await lstat(path.join(root, entry.name));
              totalBytes += stat.size;
              fileCount += 1;
              componentBytes[entry.name] = stat.size;
            }
          }

          const manifest = JSON.parse(await readFile(path.join(root, "manifest.json"), "utf8"));
          const gitPath = manifest.paths.gitExecutable;
          const gitHash = manifest.sha256[gitPath];
          if (typeof gitHash !== "string") {
            throw new Error(`manifest is missing the Git executable hash for ${gitPath}`);
          }
          const matchingGitPaths = Object.entries(manifest.sha256)
            .filter(([, hash]) => hash === gitHash)
            .map(([relativePath]) => relativePath);
          let matchingGitBytes = 0;
          for (const relativePath of matchingGitPaths) {
            matchingGitBytes += (await lstat(path.join(root, relativePath))).size;
          }
          const canonicalGitBytes = (await lstat(path.join(root, gitPath))).size;
          const repeatedGitBinaryBytes = matchingGitBytes - canonicalGitBytes;
          // Conservative rounded-down baselines from the expanded v0.1.2 distributions.
          const legacyDuplicateGitBytes = {
            "macos-universal": 1_700_000_000,
            "linux-x86_64": 3_900_000_000,
          }[process.env.TOOLCHAIN_TARGET] ?? null;
          const maximumDuplicateGitBytes = legacyDuplicateGitBytes === null
            ? null
            : Math.floor(legacyDuplicateGitBytes * 0.2);
          if (
            maximumDuplicateGitBytes !== null &&
            repeatedGitBinaryBytes > maximumDuplicateGitBytes
          ) {
            throw new Error(
              `duplicate Git binaries use ${repeatedGitBinaryBytes} bytes; expected at most ${maximumDuplicateGitBytes} bytes for an 80% reduction`,
            );
          }
          const evidence = {
            schemaVersion: 1,
            target: process.env.TOOLCHAIN_TARGET,
            toolchainRevision: manifest.toolchainRevision,
            distributionFingerprint: manifest.distributionFingerprint,
            commitSha: process.env.GITHUB_SHA,
            workflowRunUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            validation: "pnpm git-toolchain:verify",
          };
          const sizes = {
            schemaVersion: 1,
            target: process.env.TOOLCHAIN_TARGET,
            totalBytes,
            fileCount,
            componentBytes,
            recommendedBudgetBytes: Math.ceil(totalBytes * 1.1),
            recommendedComponentBudgetBytes: Object.fromEntries(
              Object.entries(componentBytes).map(([component, bytes]) => [
                component,
                Math.ceil(bytes * 1.1),
              ]),
            ),
            duplicateGit: {
              matchingFileCount: matchingGitPaths.length,
              repeatedFileCount: Math.max(0, matchingGitPaths.length - 1),
              repeatedBytes: repeatedGitBinaryBytes,
              legacyBaselineBytes: legacyDuplicateGitBytes,
              maximumBytesForEightyPercentReduction: maximumDuplicateGitBytes,
              reductionPercent: legacyDuplicateGitBytes === null
                ? null
                : Number(
                    (
                      (1 - repeatedGitBinaryBytes / legacyDuplicateGitBytes) *
                      100
                    ).toFixed(2),
                  ),
            },
          };
          await mkdir(outputDir, { recursive: true });
          await writeFile(path.join(outputDir, "build-evidence.json"), `${JSON.stringify(evidence, null, 2)}\n`);
          await writeFile(path.join(outputDir, "size-report.json"), `${JSON.stringify(sizes, null, 2)}\n`);
          NODE

      - name: Upload audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: git-toolchain-audit-${{ matrix.target }}
          path: artifacts/git-toolchain-audit-${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 14
