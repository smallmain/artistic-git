name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish when ENABLE_MAIN_RELEASE=true and the release environment approves."
        type: boolean
        default: false
      bump:
        description: "Override the calculated SemVer bump for manual releases."
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      git_dist_run_id:
        description: "Completed Git Distribution workflow run id that uploaded artistic-git-dist-* artifacts."
        type: string
        default: ""

permissions:
  contents: write
  actions: read

env:
  CI: true

jobs:
  plan:
    name: Version and notes
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      has_changes: ${{ steps.release.outputs.has_changes }}
      notes_path: ${{ steps.release.outputs.notes_path }}
      latest_json_path: ${{ steps.release.outputs.latest_json_path }}
      publish_release: ${{ steps.mode.outputs.publish_release }}
      mode_reason: ${{ steps.mode.outputs.mode_reason }}
      git_dist_run_id: ${{ steps.mode.outputs.git_dist_run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Calculate release version
        id: release
        shell: bash
        env:
          BUMP_OVERRIDE: ${{ github.event.inputs.bump || 'auto' }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release"
          args=(
            --output-dir "$RUNNER_TEMP/release"
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$BUMP_OVERRIDE" != "auto" ]; then
            args+=(--bump "$BUMP_OVERRIDE")
          fi
          node scripts/release-version.mjs \
            "${args[@]}"

      - name: Determine release mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ENABLE_MAIN_RELEASE: ${{ vars.ENABLE_MAIN_RELEASE }}
          DISPATCH_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
          GIT_DIST_RUN_ID: ${{ github.event.inputs.git_dist_run_id || vars.GIT_DIST_RUN_ID || '' }}
          HAS_CHANGES: ${{ steps.release.outputs.has_changes }}
        run: |
          set -euo pipefail
          publish_release=false
          reason="dry-run: ENABLE_MAIN_RELEASE is not true or publish was not requested"

          if [ "$HAS_CHANGES" != "true" ]; then
            reason="dry-run: no commits after the previous release tag"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "main" ] && [ "$ENABLE_MAIN_RELEASE" = "true" ]; then
            publish_release=true
            reason="release: main push with ENABLE_MAIN_RELEASE=true"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_PUBLISH" = "true" ] && [ "$ENABLE_MAIN_RELEASE" = "true" ]; then
            publish_release=true
            reason="release: manual publish with ENABLE_MAIN_RELEASE=true"
          fi

          if [ "$publish_release" = "true" ] && [ -z "$GIT_DIST_RUN_ID" ]; then
            publish_release=false
            reason="dry-run: publish requires git_dist_run_id input or GIT_DIST_RUN_ID repository variable for staged embedded Git artifacts"
          fi

          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "mode_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "git_dist_run_id=$GIT_DIST_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "$reason"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: ${{ runner.temp }}/release/
          retention-days: 14

  dry-run:
    name: Dry-run package (${{ matrix.os }})
    needs: plan
    if: needs.plan.outputs.publish_release != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release scripts and bundle resources
        run: pnpm release:check

      - name: Generate release rehearsal dry-run checklist
        env:
          ARTISTIC_GIT_RELEASE_REHEARSAL_REPORT_DIR: ${{ runner.temp }}/release-rehearsal
          ARTISTIC_GIT_RELEASE_REHEARSAL_ARTIFACT_NAME: release-rehearsal-${{ runner.os }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_RUN_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
          ARTISTIC_GIT_RELEASE_WORKFLOW_ATTEMPT: ${{ github.run_attempt }}
          ARTISTIC_GIT_RELEASE_WORKFLOW_SHA: ${{ github.sha }}
          ARTISTIC_GIT_RELEASE_PLAN_VERSION: ${{ needs.plan.outputs.version }}
          ARTISTIC_GIT_RELEASE_PLAN_TAG: ${{ needs.plan.outputs.tag }}
          ARTISTIC_GIT_RELEASE_MODE_REASON: ${{ needs.plan.outputs.mode_reason }}
        run: pnpm release:rehearsal:checklist

      - name: Upload release rehearsal dry-run checklist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-rehearsal-${{ runner.os }}
          path: ${{ runner.temp }}/release-rehearsal/
          retention-days: 14

      - name: Dry-run Tauri package build
        run: pnpm tauri build --ci --no-bundle

  package:
    name: Package release (${{ matrix.os }})
    needs: plan
    if: needs.plan.outputs.publish_release == 'true'
    environment: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app,dmg
            target: universal-apple-darwin
            gitDistTarget: macos-universal
            artifactName: artistic-git-macos
          - os: windows-latest
            bundles: nsis
            target: x86_64-pc-windows-msvc
            gitDistTarget: windows-x86_64
            artifactName: artistic-git-windows
          - os: ubuntu-22.04
            bundles: appimage,deb
            target: x86_64-unknown-linux-gnu
            gitDistTarget: linux-x86_64
            artifactName: artistic-git-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release scripts and bundle resources
        run: pnpm release:check

      - name: Download staged embedded Git resources
        uses: actions/download-artifact@v4
        with:
          name: artistic-git-dist-${{ matrix.gitDistTarget }}
          path: src-tauri/resources/git-dist
          run-id: ${{ needs.plan.outputs.git_dist_run_id }}
          github-token: ${{ github.token }}

      - name: Download git-dist build evidence
        uses: actions/download-artifact@v4
        with:
          name: git-dist-build-evidence-${{ matrix.gitDistTarget }}
          path: ${{ runner.temp }}/git-dist-build-evidence/${{ matrix.gitDistTarget }}
          run-id: ${{ needs.plan.outputs.git_dist_run_id }}
          github-token: ${{ github.token }}

      - name: Verify git-dist build evidence
        shell: bash
        env:
          ARTISTIC_GIT_DIST_ARTIFACT_NAME: artistic-git-dist-${{ matrix.gitDistTarget }}
          ARTISTIC_GIT_DIST_BUILD_EVIDENCE: ${{ runner.temp }}/git-dist-build-evidence/${{ matrix.gitDistTarget }}/git-dist-build-evidence.json
          ARTISTIC_GIT_DIST_RUN_ID: ${{ needs.plan.outputs.git_dist_run_id }}
          ARTISTIC_GIT_DIST_TARGET: ${{ matrix.gitDistTarget }}
        run: node scripts/verify-git-dist-build-evidence.mjs

      - name: Apply release version to package manifests
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";

          const version = process.env.RELEASE_VERSION;
          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const json = JSON.parse(await readFile(file, "utf8"));
            json.version = version;
            await writeFile(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          NODE

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: node scripts/apply-tauri-updater-public-key.mjs

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_UPDATER_PUBLIC_KEY:-}" ]; then
            echo "TAURI_UPDATER_PUBLIC_KEY must be configured in GitHub Variables or Secrets before publishing updater artifacts." >&2
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY must be configured in GitHub Secrets before publishing updater artifacts." >&2
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD must be configured in GitHub Secrets before publishing updater artifacts." >&2
            exit 1
          fi

      - name: Validate staged embedded Git resources
        shell: bash
        env:
          ARTISTIC_GIT_DIST_DIR: src-tauri/resources/git-dist
        run: |
          set -euo pipefail
          node scripts/check-tauri-bundle-resources.mjs --require-manifest --release
          node scripts/check-git-dist.mjs --target="${{ matrix.gitDistTarget }}"

      - name: Build Tauri bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"

      - name: Verify packaged embedded Git resources
        shell: bash
        run: |
          set -euo pipefail
          node scripts/check-tauri-bundle-resources.mjs \
            --require-manifest \
            --release \
            --bundle-output "src-tauri/target/${{ matrix.target }}/release" \
            --require-bundled-resource

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          bundle_dirs=(
            "src-tauri/target/release/bundle"
            "src-tauri/target/${{ matrix.target }}/release/bundle"
          )
          for bundle_dir in "${bundle_dirs[@]}"; do
            if [ ! -d "$bundle_dir" ]; then
              continue
            fi
            find "$bundle_dir" -type f \
              \( -name '*.dmg' \
              -o -name '*.app.tar.gz' \
              -o -name '*.app.tar.gz.sig' \
              -o -name '*.AppImage' \
              -o -name '*.AppImage.tar.gz' \
              -o -name '*.AppImage.tar.gz.sig' \
              -o -name '*.deb' \
              -o -name '*.exe' \
              -o -name '*.exe.zip' \
              -o -name '*.exe.zip.sig' \
              -o -name '*.sig' \) \
              -exec cp {} release-assets/ \;
          done
          test -n "$(find release-assets -type f -print -quit)"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: release-assets/
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [plan, package]
    if: needs.plan.outputs.publish_release == 'true'
    environment: release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: release-plan

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: artistic-git-*
          merge-multiple: true

      - name: Generate updater latest.json
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.plan.outputs.tag }}
          RELEASE_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          PUB_DATE="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('release-plan/release-plan.json', 'utf8')).generatedAt)")"
          node scripts/generate-tauri-latest-json.mjs \
            --assets-dir release-assets \
            --version "$RELEASE_VERSION" \
            --tag "$TAG_NAME" \
            --repo "$GH_REPO" \
            --notes-file release-plan/RELEASE_NOTES.md \
            --pub-date "$PUB_DATE" \
            --output release-assets/latest.json

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" release-assets/* \
            --title "Artistic Git $TAG_NAME" \
            --target "$GITHUB_SHA" \
            --notes-file release-plan/RELEASE_NOTES.md
