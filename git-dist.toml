# Artistic Git embedded Git distribution configuration.
#
# This file is the single source of truth for the embedded Git, Git LFS, and
# Windows OpenSSH distribution. Schema-only checks may keep documented
# placeholders, but real build/fetch/package mode must reject every placeholder
# pin and every non-stable source.

schema_version = 1

[meta]
last_verified = "2026-07-08"
version_source_policy = "official release pages or official source mirrors only"
notes = "Win32-OpenSSH currently has no modern stable GitHub release; GitHub API latest release metadata reports 10.0.0.0p2-Preview and it remains a rejected placeholder."

[versions]
git = "2.55.0"
git_for_windows = "2.55.0.windows.2"
git_for_windows_package = "2.55.0.2"
git_lfs = "3.7.1"
win32_openssh = "10.0.0.0p2-Preview"
helper = "0.1.0"

[validation]
schema_only_allows_placeholders = true
real_build_rejects_placeholders = true
real_build_rejects_non_stable_sources = true
checksum_algorithm = "sha256"
zero_sha256_is_placeholder = true
allow_system_git_fallback = false

[artifacts]
name = "git-dist"
archive_prefix = "artistic-git-dist"
manifest = "manifest.json"
retention_days = 14

[resources.layout]
root = "git-dist"
manifest = "manifest.json"
git = "git/"
git_executable = "git/bin/git"
git_executable_windows = "git/bin/git.exe"
git_lfs = "git-lfs/"
git_lfs_executable = "git-lfs/git-lfs"
git_lfs_executable_windows = "git-lfs/git-lfs.exe"
windows_openssh = "openssh/"
windows_ssh_executable = "openssh/ssh.exe"
helpers = "helpers/"
credential_helper = "helpers/artistic-git-credential-helper"
credential_helper_windows = "helpers/artistic-git-credential-helper.exe"
ssh_askpass = "helpers/artistic-git-ssh-askpass"
ssh_askpass_windows = "helpers/artistic-git-ssh-askpass.exe"

[manifest]
schema_version = 1
format = "GitDistManifest from crates/contracts"
path_style = "relative-to-git-dist-root"
required_executable_keys = ["gitExecutable", "gitLfsExecutable", "credentialHelper", "sshAskpass"]
windows_required_executable_keys = ["gitExecutable", "gitLfsExecutable", "windowsSshExecutable", "credentialHelper", "sshAskpass"]
checksum_key_style = "manifest relative executable path"

[targets.windows-x86_64]
platform = "windows"
arch = "x86_64"
manifest_platform = "windows-x86_64"
artifact_name = "artistic-git-dist-windows-x86_64"
sources = ["sources.windows.x86_64.git", "sources.windows.x86_64.git_lfs", "sources.windows.x86_64.win32_openssh"]

[targets.macos-universal]
platform = "macos"
arch = "universal"
manifest_platform = "macos-universal"
artifact_name = "artistic-git-dist-macos-universal"
sources = ["sources.macos.universal.git", "sources.macos.arm64.git_lfs", "sources.macos.x86_64.git_lfs"]

[targets.linux-x86_64]
platform = "linux"
arch = "x86_64"
manifest_platform = "linux-x86_64"
artifact_name = "artistic-git-dist-linux-x86_64"
sources = ["sources.linux.x86_64.git", "sources.linux.x86_64.git_lfs"]

[sources.windows.x86_64.git]
component = "git"
kind = "archive"
vendor = "Git for Windows MinGit"
version_key = "git_for_windows"
package_version_key = "git_for_windows_package"
stable = true
url = "https://github.com/git-for-windows/git/releases/download/v2.55.0.windows.2/MinGit-2.55.0.2-64-bit.zip"
release_url = "https://github.com/git-for-windows/git/releases/tag/v2.55.0.windows.2"
asset_name = "MinGit-2.55.0.2-64-bit.zip"
checksum.algorithm = "sha256"
